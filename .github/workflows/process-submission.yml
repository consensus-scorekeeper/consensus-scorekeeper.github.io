# Turns "Submit game results" issues (the submit-results.yml issue form)
# into reviewable PRs. scripts/process-submission.mjs validates the CSVs
# and writes them into tournaments/<slug>/results/ in the checkout; this
# workflow commits the working-tree changes to a per-issue branch, opens
# (or updates) a PR, and reports back on the issue.
#
# Runs on `edited` too, so a submitter can fix a rejected submission by
# editing the issue — the same branch/PR is force-updated each time.
#
# Safety: the issue body is untrusted. The script only ever writes
# sanitized filenames under a registry-validated tournament slug, all
# untrusted text reaches the shell via --body-file, and merging the PR is
# a manual maintainer review step.

name: Process results submission

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'results-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate and stage submitted CSVs
        id: process
        run: node scripts/process-submission.mjs

      - name: Create or update submission PR
        id: pr
        if: steps.process.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          SLUG: ${{ steps.process.outputs.slug }}
        run: |
          BRANCH="submission/issue-$ISSUE"
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B "$BRANCH"
          # roster-presets.js is included because new-tournament
          # submissions append a registry entry to it.
          git add tournaments src/ui/roster-presets.js
          if git diff --cached --quiet; then
            echo "No changes — submitted games are identical to what's already published."
            echo "pr_note=No changes: every submitted game is already published with identical stats." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Add submitted results from #$ISSUE"
          git push -f origin "$BRANCH"
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[].url' | head -n 1)
          if [ -z "$PR_URL" ]; then
            printf 'Results submitted via #%s.\n\nCloses #%s\n' "$ISSUE" "$ISSUE" > "$RUNNER_TEMP/pr-body.md"
            # On failure, surface gh's actual error in the issue comment —
            # PR creation is the step most often blocked by org/repo
            # Actions settings, and the submitter can't read run logs.
            if ! PR_URL=$(gh pr create --head "$BRANCH" \
                --title "Results submission (#$ISSUE)" \
                --body-file "$RUNNER_TEMP/pr-body.md" 2> "$RUNNER_TEMP/gh-error.txt"); then
              {
                echo 'pr_note<<PR_NOTE_EOF'
                echo "⚠️ The games validated and branch \`$BRANCH\` was pushed, but opening the PR failed:"
                echo '```'
                cat "$RUNNER_TEMP/gh-error.txt"
                echo '```'
                echo 'A maintainer can open the PR from that branch manually, or fix the setting and re-run the failed job.'
                echo 'PR_NOTE_EOF'
              } >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          # tournaments/preview.html renders these stats straight from the
          # submission branch, so submitters see them before the PR merges.
          PREVIEW_URL="https://consensus-scorekeeper.github.io/tournaments/preview.html?slug=$SLUG&preview=$ISSUE"
          {
            echo 'pr_note<<PR_NOTE_EOF'
            echo "Opened/updated PR for review: $PR_URL"
            echo ''
            echo "📊 [**Preview these stats now**]($PREVIEW_URL) — no need to wait for the merge. The preview always shows this submission's latest validated version; once merged, the games appear on the tournament's own stats page."
            echo 'PR_NOTE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Report back on the issue
        if: always() && steps.process.outputs.status != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          PR_NOTE: ${{ steps.pr.outputs.pr_note }}
        run: |
          if [ -n "$PR_NOTE" ]; then
            printf '\n%s\n' "$PR_NOTE" >> "$RUNNER_TEMP/summary.md"
          fi
          gh issue comment "$ISSUE" --body-file "$RUNNER_TEMP/summary.md"
